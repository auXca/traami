<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Traami – Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:40px;width:100%;max-width:400px;margin:20px}
.logo{font-size:28px;font-weight:900;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
h2{font-size:22px;font-weight:700;margin-bottom:6px}
.sub{color:#64748b;font-size:14px;margin-bottom:28px}
label{font-size:13px;color:#94a3b8;display:block;margin-bottom:6px}
input{background:#0f172a;border:1px solid #334155;color:#e2e8f0;border-radius:10px;padding:12px 14px;width:100%;margin-bottom:16px;font-size:14px}
input:focus{border-color:#4f46e5;outline:none;box-shadow:0 0 0 3px rgba(79,70,229,.2)}
.btn{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;border-radius:10px;padding:13px;width:100%;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.btn:hover{opacity:.9}
.link{text-align:center;margin-top:18px;font-size:13px;color:#64748b}
.link a{color:#818cf8;text-decoration:none}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">⚡ Traami</div>
  <h2>Welcome back</h2>
  <p class="sub">Sign in to your account</p>
  <div id="errMsg" class="error"></div>
  <label>Email</label>
  <input id="email" type="email" placeholder="you@example.com">
  <label>Password</label>
  <input id="password" type="password" placeholder="••••••••">
  <button class="btn" onclick="login()">Sign In</button>
  <div class="link">Don't have an account? <a href="register.html">Sign up free</a></div>
</div>
<script>
async function login() {
  const email = document.getElementById("email").value
  const password = document.getElementById("password").value
  const err = document.getElementById("errMsg")
  err.style.display = "none"
  const res = await fetch("/api/auth/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  })
  const data = await res.json()
  if (data.token) {
    localStorage.setItem("token", data.token)
    localStorage.setItem("userId", data.userId)
    localStorage.setItem("role", data.role || "user")
    window.location.href = data.role === "admin" ? "admin.html" : "dashboard.html"
  } else {
    err.textContent = data.message || "Login failed"
    err.style.display = "block"
  }
}
</script>
</body>
</html>
