<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Traami – Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:40px;width:100%;max-width:400px}
.logo{font-size:26px;font-weight:800;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
h2{font-size:21px;font-weight:700;margin-bottom:4px}
.sub{color:#64748b;font-size:13px;margin-bottom:28px}
label{font-size:12px;color:#94a3b8;display:block;margin-bottom:5px;margin-top:14px;text-transform:uppercase;letter-spacing:.5px}
input{background:#0f172a;border:1px solid #334155;color:#e2e8f0;border-radius:10px;padding:12px 14px;width:100%;font-size:14px;transition:border-color .2s}
input:focus{border-color:#4f46e5;outline:none;box-shadow:0 0 0 3px rgba(79,70,229,.2)}
.btn{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;border-radius:10px;padding:13px;width:100%;font-size:15px;font-weight:700;cursor:pointer;margin-top:20px}
.btn:hover{opacity:.9}
.link{text-align:center;margin-top:18px;font-size:13px;color:#64748b}
.link a{color:#818cf8;text-decoration:none}
.forgot{text-align:right;margin-top:6px}
.forgot a{color:#64748b;font-size:12px;text-decoration:none}
.forgot a:hover{color:#818cf8}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;border-radius:8px;padding:10px 14px;font-size:13px;margin-top:16px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">⚡ Traami</div>
  <h2>Welcome back</h2>
  <p class="sub">Sign in to your account</p>
  <div id="err" class="err"></div>
  <label>Email</label>
  <input id="email" type="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')login()">
  <label>Password</label>
  <input id="password" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
  <div class="forgot"><a href="forgot-password.html">Forgot password?</a></div>
  <button class="btn" onclick="login()" id="btn">Sign In</button>
  <div class="link">No account? <a href="register.html">Sign up free</a></div>
</div>
<script>
async function login() {
  const email = document.getElementById("email").value.trim()
  const password = document.getElementById("password").value
  const err = document.getElementById("err")
  const btn = document.getElementById("btn")
  err.style.display = "none"
  if (!email || !password) { err.textContent = "Please enter email and password"; err.style.display = "block"; return }
  btn.textContent = "Signing in..."
  btn.disabled = true
  try {
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    })
    const data = await res.json()
    if (data.token) {
      localStorage.setItem("token", data.token)
      localStorage.setItem("userId", data.userId)
      localStorage.setItem("role", data.role || "user")
      localStorage.setItem("name", data.name || "")
      window.location.href = data.role === "admin" ? "admin.html" : "dashboard.html"
    } else {
      err.textContent = data.message || "Login failed"
      err.style.display = "block"
      btn.textContent = "Sign In"
      btn.disabled = false
    }
  } catch(e) {
    err.textContent = "Connection error. Please try again."
    err.style.display = "block"
    btn.textContent = "Sign In"
    btn.disabled = false
  }
}
</script>
</body>
</html>
