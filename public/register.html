<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Traami – Create Account</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:40px;width:100%;max-width:460px}
.logo{font-size:26px;font-weight:800;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
h2{font-size:21px;font-weight:700;margin-bottom:4px}
.sub{color:#64748b;font-size:13px;margin-bottom:24px}
label{font-size:11px;color:#94a3b8;display:block;margin-bottom:4px;margin-top:12px;text-transform:uppercase;letter-spacing:.5px}
input,select{background:#0f172a;border:1px solid #334155;color:#e2e8f0;border-radius:10px;padding:11px 14px;width:100%;font-size:14px;transition:border-color .2s}
input:focus,select:focus{border-color:#4f46e5;outline:none;box-shadow:0 0 0 3px rgba(79,70,229,.2)}
select option{background:#1e293b}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.divider{border:none;border-top:1px solid #334155;margin:20px 0}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:#64748b;margin-bottom:2px}
.btn{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;border-radius:10px;padding:13px;width:100%;font-size:15px;font-weight:700;cursor:pointer;margin-top:18px}
.btn:hover{opacity:.9}
.link{text-align:center;margin-top:16px;font-size:13px;color:#64748b}
.link a{color:#818cf8;text-decoration:none}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;border-radius:8px;padding:10px 14px;font-size:13px;margin-top:12px;display:none}
.terms-note{font-size:12px;color:#475569;text-align:center;margin-top:14px;line-height:1.5}
.terms-note a{color:#818cf8;text-decoration:none}
@media(max-width:480px){.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">⚡ Traami</div>
  <h2>Create your account</h2>
  <p class="sub">Join shift workers saving on their commute</p>
  <div id="err" class="err"></div>

  <label>Full Name</label>
  <input id="name" placeholder="Your full name">

  <div class="row2">
    <div><label>Email</label><input id="email" type="email" placeholder="you@work.com"></div>
    <div><label>Password</label><input id="password" type="password" placeholder="Min 6 chars"></div>
  </div>

  <hr class="divider">
  <div class="section-title">🏢 Workplace (optional but helps matching)</div>

  <div class="row2">
    <div><label>Company / Employer</label><input id="company" placeholder="e.g. NHS, Amazon, Jaguar"></div>
    <div><label>Work Location</label><input id="workLocation" placeholder="e.g. QE Hospital B'ham"></div>
  </div>

  <label>Work Schedule</label>
  <select id="scheduleType">
    <option value="rota">Rota / Shift work (NHS, factory etc)</option>
    <option value="fixed">Fixed schedule (same time every day)</option>
    <option value="flexible">Flexible / Remote</option>
  </select>

  <button class="btn" onclick="register()" id="btn">Create Account</button>
  <p class="terms-note">By signing up you agree to our <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a></p>
  <div class="link">Already have an account? <a href="login.html">Sign in</a></div>
</div>
<script>
async function register() {
  const name = document.getElementById("name").value.trim()
  const email = document.getElementById("email").value.trim()
  const password = document.getElementById("password").value
  const err = document.getElementById("err")
  const btn = document.getElementById("btn")
  err.style.display = "none"
  if (!name || !email || !password) { err.textContent = "Name, email and password are required"; err.style.display = "block"; return }
  if (password.length < 6) { err.textContent = "Password must be at least 6 characters"; err.style.display = "block"; return }
  btn.textContent = "Creating account..."
  btn.disabled = true
  try {
    const res = await fetch("/api/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name, email, password,
        company: document.getElementById("company").value,
        workLocation: document.getElementById("workLocation").value,
        scheduleType: document.getElementById("scheduleType").value
      })
    })
    const data = await res.json()
    if (data.message === "Account created successfully") {
      window.location.href = "login.html"
    } else {
      err.textContent = data.message || "Registration failed"
      err.style.display = "block"
      btn.textContent = "Create Account"
      btn.disabled = false
    }
  } catch(e) {
    err.textContent = "Connection error. Please try again."
    err.style.display = "block"
    btn.textContent = "Create Account"
    btn.disabled = false
  }
}
</script>
</body>
</html>
