<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="logo.png">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Traami – Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:16px}
.card{margin:auto}
.card{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:40px;width:100%;max-width:400px}
.logo{font-size:24px;font-weight:800;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
h2{font-size:20px;font-weight:700;margin-bottom:4px}
.sub{color:#64748b;font-size:13px;margin-bottom:24px}
label{font-size:11px;color:#94a3b8;display:block;margin-bottom:5px;margin-top:14px;text-transform:uppercase;letter-spacing:.5px}
input{background:#0f172a;border:1px solid #475569;color:#e2e8f0;border-radius:10px;padding:12px 14px;width:100%;font-size:14px;transition:border-color .2s}
input:focus{border-color:#4f46e5;outline:none;box-shadow:0 0 0 3px rgba(79,70,229,.2)}
.btn{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;border-radius:10px;padding:13px;width:100%;font-size:15px;font-weight:700;cursor:pointer;margin-top:20px}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.6;cursor:not-allowed}
.forgot{text-align:right;margin-top:6px}
.forgot a{color:#64748b;font-size:12px;text-decoration:none}
.forgot a:hover{color:#818cf8}
.link{text-align:center;margin-top:18px;font-size:13px;color:#64748b}
.link a{color:#818cf8;text-decoration:none}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;border-radius:8px;padding:12px 14px;font-size:13px;margin-top:14px;display:none}
.verify-box{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.3);color:#fbbf24;border-radius:8px;padding:12px 14px;font-size:13px;margin-top:14px;display:none;line-height:1.6}
.verify-box a{color:#fbbf24;font-weight:600}
.login-hint{font-size:12px;color:#94a3b8;margin-top:8px;line-height:1.5}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><img src="logo.png" alt="Traami" style="height:48px;"></div>
  <h2>Welcome back</h2>
  <p class="sub">Sign in to your account</p>

  <div id="err" class="err"></div>
  <div id="verifyBox" class="verify-box">
    Please verify your email before logging in. <br>
    <a href="#" onclick="resendVerification()">Resend verification email →</a>
  </div>

  <label>Email, Username or Phone</label>
  <input id="login" placeholder="your@email.com or @username or +44..." autocomplete="username"
    onkeydown="if(event.key==='Enter')login()">
  <p class="login-hint">You can log in with your email address, username, or phone number</p>

  <label>Password</label>
  <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"
    onkeydown="if(event.key==='Enter')doLogin()">
  <div class="forgot"><a href="forgot-password.html">Forgot password?</a></div>

  <button class="btn" onclick="doLogin()" id="btn">Sign In</button>
  <div class="link">No account? <a href="register.html">Sign up free</a></div>
</div>

<script>
let lastEmail = ""

async function doLogin() {
  const loginInput = document.getElementById("login").value.trim()
  const password = document.getElementById("password").value
  const err = document.getElementById("err")
  const btn = document.getElementById("btn")
  const verifyBox = document.getElementById("verifyBox")

  err.style.display = "none"
  verifyBox.style.display = "none"

  if (!loginInput || !password) { err.textContent = "Please enter your login and password"; err.style.display = "block"; return }

  btn.textContent = "Signing in..."
  btn.disabled = true
  lastEmail = loginInput.includes("@") ? loginInput : ""

  try {
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ login: loginInput, password })
    })
    const data = await res.json()
    if (data.token) {
      localStorage.setItem("token", data.token)
      localStorage.setItem("userId", data.userId)
      localStorage.setItem("role", data.role || "user")
      localStorage.setItem("name", data.firstName || data.name || "")
      localStorage.setItem("firstName", data.firstName || "")
      const next = sessionStorage.getItem("redirectAfterLogin") || (data.role === "admin" ? "admin.html" : "dashboard.html")
      sessionStorage.removeItem("redirectAfterLogin")
      window.location.href = next
    } else if (data.needsVerification) {
      verifyBox.style.display = "block"
      btn.textContent = "Sign In"
      btn.disabled = false
    } else {
      err.textContent = data.message || "Login failed"
      err.style.display = "block"
      btn.textContent = "Sign In"
      btn.disabled = false
    }
  } catch (e) {
    err.textContent = "Connection error. Please try again."
    err.style.display = "block"
    btn.textContent = "Sign In"
    btn.disabled = false
  }
}

async function resendVerification() {
  const email = lastEmail || document.getElementById("login").value.trim()
  if (!email) { alert("Please enter your email address first"); return }
  const res = await fetch("/api/auth/resend-verification", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email })
  })
  const data = await res.json()
  alert(data.message)
}
</script>
<script src="theme.js"></script>

</body>
</html>
