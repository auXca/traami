<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Traami – Reset Password</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:40px;width:100%;max-width:400px}
.logo{font-size:24px;font-weight:800;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px}
h2{font-size:20px;font-weight:700;margin-bottom:6px}
.sub{color:#64748b;font-size:13px;margin-bottom:24px;line-height:1.6}
label{font-size:11px;color:#94a3b8;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
input{background:#0f172a;border:1px solid #334155;color:#e2e8f0;border-radius:10px;padding:12px 14px;width:100%;font-size:14px;margin-bottom:8px}
input:focus{border-color:#4f46e5;outline:none;box-shadow:0 0 0 3px rgba(79,70,229,.2)}
.btn{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;border-radius:10px;padding:13px;width:100%;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.link{text-align:center;margin-top:18px;font-size:13px;color:#64748b}
.link a{color:#818cf8;text-decoration:none}
.msg{border-radius:8px;padding:10px 14px;font-size:13px;margin-top:12px;display:none}
.msg.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80}
.msg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171}
.step{display:none}
.step.active{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">⚡ Traami</div>

  <!-- Step 1: enter email -->
  <div class="step active" id="step1">
    <h2>Reset your password</h2>
    <p class="sub">Enter your email and we'll send you a reset link</p>
    <div id="msg1" class="msg"></div>
    <label>Email address</label>
    <input id="email" type="email" placeholder="you@example.com">
    <button class="btn" onclick="requestReset()">Send Reset Link</button>
    <div class="link"><a href="login.html">← Back to login</a></div>
  </div>

  <!-- Step 2: enter new password -->
  <div class="step" id="step2">
    <h2>Set new password</h2>
    <p class="sub">Enter the reset token you received and your new password</p>
    <div id="msg2" class="msg"></div>
    <label>Reset Token</label>
    <input id="resetToken" placeholder="Paste token here">
    <label>New Password</label>
    <input id="newPassword" type="password" placeholder="At least 6 characters">
    <button class="btn" onclick="doReset()">Reset Password</button>
  </div>
</div>
<script>
async function requestReset() {
  const email = document.getElementById("email").value.trim()
  const msg = document.getElementById("msg1")
  if (!email) { msg.textContent = "Please enter your email"; msg.className = "msg err"; msg.style.display = "block"; return }
  const res = await fetch("/api/auth/forgot-password", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email })
  })
  const data = await res.json()
  if (data.resetToken) {
    // In production this would be emailed — for now show it
    msg.textContent = "Reset token: " + data.resetToken + " (copy this)"
    msg.className = "msg ok"
    msg.style.display = "block"
    setTimeout(() => {
      document.getElementById("step1").classList.remove("active")
      document.getElementById("step2").classList.add("active")
      document.getElementById("resetToken").value = data.resetToken
    }, 2000)
  } else {
    msg.textContent = data.message || "Error"
    msg.className = "msg err"
    msg.style.display = "block"
  }
}
async function doReset() {
  const resetToken = document.getElementById("resetToken").value.trim()
  const newPassword = document.getElementById("newPassword").value
  const msg = document.getElementById("msg2")
  if (!resetToken || !newPassword) { msg.textContent = "Fill both fields"; msg.className = "msg err"; msg.style.display = "block"; return }
  const res = await fetch("/api/auth/reset-password", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ resetToken, newPassword })
  })
  const data = await res.json()
  msg.textContent = data.message
  msg.className = data.message.includes("successfully") ? "msg ok" : "msg err"
  msg.style.display = "block"
  if (data.message.includes("successfully")) {
    setTimeout(() => window.location.href = "login.html", 2000)
  }
}
</script>
</body>
</html>
