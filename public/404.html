<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Traami – Page Not Found</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
.container{max-width:480px}
.code{font-size:100px;font-weight:900;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
h1{font-size:24px;font-weight:700;margin:16px 0 10px}
p{color:#64748b;font-size:15px;line-height:1.7;margin-bottom:28px}
.btn{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;text-decoration:none;border-radius:10px;padding:13px 28px;font-size:15px;font-weight:700;display:inline-block}
.links{margin-top:20px;display:flex;gap:16px;justify-content:center}
.links a{color:#64748b;text-decoration:none;font-size:14px}
.links a:hover{color:#818cf8}
</style>
</head>
<body>
<div class="container">
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="/" class="btn">Go Home</a>
  <div class="links">
    <a href="/rides.html">Find Rides</a>
    <a href="/login.html">Login</a>
    <a href="/register.html">Sign Up</a>
  </div>
</div>
</body>
</html>
